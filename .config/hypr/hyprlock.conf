general {
    no_fade_in = false
    grace = 0
    disable_loading = false
}

background {
    monitor =
    color = rgb(26, 26, 26)
}

input-field {
    monitor =
    size = 200, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgb(58, 58, 58)
    inner_color = rgb(26, 26, 26)
    font_color = rgb(224, 224, 224)
    fade_on_empty = false
    placeholder_text = <span foreground="##888888">enter password</span>
    hide_input = false
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = login: $USER
    color = rgb(224, 224, 224)
    font_size = 14
    font_family = Iosevka Nerd Font
    position = 0, 40
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgba(200, 200, 200, 1.0)
    font_size = 64
    font_family = Iosevka Nerd Font
    position = -30, 0
    halign = right
    valign = top
}
